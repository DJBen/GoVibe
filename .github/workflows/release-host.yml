name: Release GoVibe Host

on:
  push:
    tags:
      - 'host/v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. host/v1.0.0
          VERSION="${TAG#host/v}"            # e.g. 1.0.0
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      # ── Apple signing ──────────────────────────────────────────────────────
      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── Build config ───────────────────────────────────────────────────────
      - name: Write local xcconfig
        env:
          GCP_PROJECT_ID: ${{ secrets.GOVIBE_GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GOVIBE_GCP_REGION }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cat > ios/Config/Shared.xcconfig.local <<EOF
          GOVIBE_GCP_PROJECT_ID = ${GCP_PROJECT_ID}
          GOVIBE_GCP_REGION = ${GCP_REGION}
          GOVIBE_GCP_RELAY_HOST = UNUSED
          MARKETING_VERSION = ${VERSION}
          EOF

      # ── App Store Connect API key (needed for provisioning + notarization) ──
      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.APPLE_ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
        run: |
          KEY_DIR="$RUNNER_TEMP/asc-keys"
          mkdir -p "$KEY_DIR"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode -o "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # ── Archive ────────────────────────────────────────────────────────────
      - name: Archive GoVibeHost
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project ios/GoVibe.xcodeproj \
            -scheme GoVibeHost \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/GoVibeHost.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM=52RD2GH5DP \
            ENABLE_HARDENED_RUNTIME=YES

      # ── Export ─────────────────────────────────────────────────────────────
      - name: Export Developer ID app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/GoVibeHost.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates

      # ── DMG ────────────────────────────────────────────────────────────────
      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Build DMG
        id: dmg
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          APP_PATH="$(find "$RUNNER_TEMP/export" -name '*.app' | head -1)"
          DMG_NAME="GoVibeHost-${VERSION}.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"

          chmod +x scripts/make-dmg.sh
          ./scripts/make-dmg.sh "$APP_PATH" "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_OUTPUT"

      # ── Notarize ───────────────────────────────────────────────────────────
      - name: Notarize DMG
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          DMG_PATH: ${{ steps.dmg.outputs.DMG_PATH }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

      - name: Staple notarization ticket
        env:
          DMG_PATH: ${{ steps.dmg.outputs.DMG_PATH }}
        run: |
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      # ── Checksum ───────────────────────────────────────────────────────────
      - name: Compute SHA-256
        id: sha
        env:
          DMG_PATH: ${{ steps.dmg.outputs.DMG_PATH }}
        run: |
          SHA256="$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')"
          echo "SHA256=$SHA256" >> "$GITHUB_OUTPUT"

      # ── GCS upload ─────────────────────────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload DMG to GCS
        env:
          DMG_PATH: ${{ steps.dmg.outputs.DMG_PATH }}
          DMG_NAME: ${{ steps.dmg.outputs.DMG_NAME }}
        run: |
          gsutil cp "$DMG_PATH" "gs://govibe-host-releases/$DMG_NAME"

      - name: Upload latest.json to GCS
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          DMG_NAME: ${{ steps.dmg.outputs.DMG_NAME }}
          SHA256: ${{ steps.sha.outputs.SHA256 }}
        run: |
          RELEASE_DATE="$(date -u +%Y-%m-%d)"
          BUILD="${GITHUB_RUN_NUMBER}"
          DMG_URL="https://storage.googleapis.com/govibe-host-releases/${DMG_NAME}"

          cat > /tmp/latest.json <<EOF
          {
            "version": "${VERSION}",
            "build": "${BUILD}",
            "dmgUrl": "${DMG_URL}",
            "sha256": "${SHA256}",
            "releaseDate": "${RELEASE_DATE}",
            "minMacOS": "15.0"
          }
          EOF

          gsutil -h "Cache-Control:no-cache, no-store" \
            cp /tmp/latest.json gs://govibe-host-releases/latest.json

      # ── Firebase Hosting ───────────────────────────────────────────────────
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: govibe-783119
          channelId: live

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: GoVibe Host v${{ steps.version.outputs.VERSION }}
          body: |
            ## GoVibe Host v${{ steps.version.outputs.VERSION }}

            **SHA-256:** `${{ steps.sha.outputs.SHA256 }}`

            ### Requirements
            - macOS 15.0 Sequoia or later
            - Apple Silicon or Intel Mac

            Download and drag **GoVibe Host.app** to your Applications folder.
          files: ${{ steps.dmg.outputs.DMG_PATH }}
          fail_on_unmatched_files: true

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Cleanup secrets
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/ci.keychain-db"
          if security list-keychains | grep -q "$KEYCHAIN_PATH"; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f "$RUNNER_TEMP/cert.p12"
          rm -rf "$RUNNER_TEMP/asc-keys"
